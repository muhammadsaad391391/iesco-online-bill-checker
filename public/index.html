<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IESCO Bill Check</title>
    <!-- Use a system font similar to the WordPress standard or the image's clean sans-serif -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- This wrapper card is what they will embed into WordPress -->
    <div class="iesco-wp-container">
        <div class="iesco-wp-card">
            <h2 class="iesco-title">IESCO Bill Check Online</h2>
            <p class="iesco-subtitle">Check your IESCO electricity bill instantly using your Reference Number or Customer ID.</p>
            
            <!-- Tabs -->
            <div class="iesco-tabs">
                <button type="button" class="iesco-tab active" data-tab="refno">Reference Number</button>
                <button type="button" class="iesco-tab" data-tab="customerid">Customer ID</button>
            </div>

            <!-- Form -->
            <form id="iescoForm" action="/view.html" method="GET" target="_blank">
                <!-- Hidden input to store what type of search we are doing -->
                <input type="hidden" name="searchType" id="searchType" value="refno">

                <div class="iesco-input-group">
                    <label for="refNo" class="iesco-label" id="iescoInputLabel">Reference Number <span class="format-hint">(14 Digit Number)</span></label>
                    <input 
                        type="text" 
                        class="iesco-input" 
                        id="refNo" 
                        name="refNo" 
                        placeholder="e.g. 04143410141600" 
                        maxlength="14" 
                        required 
                        pattern="\d{14}" 
                        title="Must be exactly 14 digits"
                        autocomplete="off"
                    >
                </div>

                <!-- Recent Searches Container -->
                <div class="recent-searches-container" id="recentSearches" style="display: none;">
                    <span class="recent-label">Recent:</span>
                    <div class="recent-chips" id="recentChips"></div>
                </div>

                <button type="submit" class="iesco-btn" id="iescoSubmitBtn">
                    <span class="iesco-btn-text">Check Bill Now</span>
                </button>
            </form>

            <p class="iesco-note">Note: This tool securely fetches your bill directly from the official PITC server.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
